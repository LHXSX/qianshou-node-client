name: Windows Client Build (v8.1.4+)

# 仅编译 Windows x64 客户端 + OTA 热更新产物
# 触发: 手动 / push tag / push main (client-v3-latest 变更)
# 产物: .exe (NSIS 安装包) + .nsis.zip (OTA) + .sig (签名)

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否发布到 GitHub Releases (true/false)'
        required: false
        default: 'true'
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'client-v3-latest/**'
      - '.github/workflows/build-windows.yml'

permissions:
  contents: write

env:
  # 国内镜像加速
  NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # ── 1. 拉代码 ──
      - uses: actions/checkout@v4

      # ── 2. Node.js 20 ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-v3-latest/package-lock.json

      # ── 3. Rust stable + Windows target ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust 缓存 ──
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './client-v3-latest/src-tauri -> target'

      # ── 5. 安装前端依赖 ──
      - name: Install frontend deps
        run: cd client-v3-latest && npm ci

      # ── 6. Prebake runtime (cpython + uv + lite/crawl venv) ──
      # 关键: 不跑 prebake 会导致 Windows 包内嵌 mac-arm64 二进制 → 安装失败
      - name: Prebake runtime
        shell: bash
        run: |
          cd client-v3-latest
          bash scripts/prebake-runtime.sh windows-x64
          echo ""
          echo "=== resources 目录确认 ==="
          ls -la src-tauri/resources/runtime/cpython/ || true
          ls -la src-tauri/resources/bin/ || true
          cat src-tauri/resources/runtime/manifest.json

      # ── 7. Tauri build (NSIS only, MSI 已废弃) ──
      - name: Build Tauri app
        run: |
          cd client-v3-latest
          npx tauri build --target x86_64-pc-windows-msvc --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      # ── 8. 重命名产物 (中文 → ASCII, 避免 URL 编码问题) ──
      - name: Rename artifacts to ASCII
        shell: bash
        run: |
          cd client-v3-latest/src-tauri/target
          find . -path '*/release/bundle/*' -name '*千手*' -print0 | while IFS= read -r -d '' f; do
            new="$(echo "$f" | sed 's/千手/Qianshou/g')"
            if [ "$f" != "$new" ]; then
              mv "$f" "$new"
              echo "renamed: $(basename "$f") → $(basename "$new")"
            fi
          done

      # ── 9. 上传构建产物 ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tauri-windows-x64
          path: |
            client-v3-latest/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            client-v3-latest/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
            client-v3-latest/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            client-v3-latest/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 30
          if-no-files-found: warn

  # ═══════════════════ 发布到 GitHub Releases ═══════════════════
  release:
    name: GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: always() && !cancelled() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: client-v3-latest/package.json
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: tauri-windows-x64
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            VER=$(node -p "require('./client-v3-latest/package.json').version")
          fi
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            TITLE="千手节点 ${TAG} (Windows)"
            NOTES="## 千手节点 ${TAG} — Windows x64

            ### 安装
            下载 \`.exe\` 直接安装即可

            ### OTA 热更新
            \`.nsis.zip\` 为热更新包，客户端自动下载

            ### 签名验证
            附带 \`.sig\` 签名文件，可用 Tauri updater 公钥验证"
            EXTRA=""
          else
            TAG="desktop-preview"
            TITLE="千手节点 v${VERSION} Preview (Windows)"
            NOTES="⚡ main 分支自动构建 · 仅供内测"
            EXTRA="--prerelease"
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            $EXTRA \
            --clobber \
            release/* 2>/dev/null || \
          gh release upload "$TAG" --clobber release/*

  # ═══════════════════ 部署到服务器下载中心 ═══════════════════
  deploy-server:
    name: Deploy to Server
    needs: build-windows
    runs-on: ubuntu-latest
    if: always() && !cancelled() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: client-v3-latest/package.json
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: tauri-windows-x64
          path: release/

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "ERR: bad version $VER"; exit 1; }
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/ci_deploy
          chmod 600 ~/.ssh/ci_deploy
          ssh-keyscan -t ed25519 47.86.60.178 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          STAGE="/tmp/qianshou-win-v${VERSION}"
          ssh -i ~/.ssh/ci_deploy root@47.86.60.178 "rm -rf ${STAGE} && mkdir -p ${STAGE}"
          scp -i ~/.ssh/ci_deploy release/* root@47.86.60.178:${STAGE}/
          ssh -i ~/.ssh/ci_deploy root@47.86.60.178 "bash -s" <<REMOTE
          set -e
          DEST=/var/www/web/downloads/latest
          for f in ${STAGE}/*; do
            [ -f "\$f" ] && cp -f "\$f" "\${DEST}/\$(basename \$f)"
          done
          echo "=== 服务器下载目录 ==="
          ls -lh \${DEST}/*.exe \${DEST}/*.nsis.zip \${DEST}/*.sig 2>/dev/null || true
          REMOTE

      - name: Verify deployment
        run: |
          sleep 2
          curl -sf "https://pidbai.com/downloads/latest/release.json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ version:', d.get('version'))" || \
            echo "⚠ release.json 验证失败"
