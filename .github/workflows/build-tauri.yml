name: build-tauri-multi-platform

# 触发条件:
#   1. 手动 (UI 上点 Run workflow) · 含 publish 选项
#   2. push tag v* · 自动 build 并发到 Releases
on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否发到 GitHub Releases (true/false)'
        required: false
        default: 'true'
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write   # 允许 release 写入
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            label: 'macos-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            label: 'macos-intel'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            label: 'windows-x64'
          # Linux 暂关 · 想开打开即可
          # - platform: 'ubuntu-22.04'
          #   args: ''
          #   label: 'linux-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      # 1 · 拉代码
      - uses: actions/checkout@v4

      # 2 · 装 Node 20 (前端 build 用)
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3 · 装 Rust 稳定版 + 目标平台 toolchain
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # mac 上额外加 intel 目标 · 其他平台用默认
          targets: ${{ matrix.label == 'macos-intel' && 'x86_64-apple-darwin' || (matrix.label == 'macos-arm64' && 'aarch64-apple-darwin' || '') }}

      # 4 · Rust 缓存 (大幅加速 · 第二次 build 节省 60%+ 时间)
      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 5 · Linux 才需要装 system deps (本 workflow 默认不开 linux)
      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 6 · 装 npm 依赖
      - name: install frontend deps
        run: npm ci

      # 7 · Tauri 一键 build + 自动签名 + (可选) 上传到 Releases
      - name: build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          # 必填 · 签名私钥 (从仓库 secrets 注入)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # GitHub Release token (auto)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tag 必须存在 (要么手动 push tag · 要么 workflow_dispatch 自动建 draft)
          tagName: ${{ github.ref_name }}
          releaseName: 'Qianshou Node ${{ github.ref_name }}'
          releaseBody: |
            ## 千手节点 ${{ github.ref_name }}
            
            自动 build 由 GitHub Actions 完成 · 含 macOS arm64 + macOS Intel + Windows x64
            
            - macOS: 下载 `.dmg` 直接装
            - Windows: 下载 `.exe` 直接装 · OTA 用 `.nsis.zip`
            
            签名验证: 公钥 `.tauri-keys-2026/qianshou-2026.key.pub`
          releaseDraft: ${{ github.event.inputs.publish_release != 'false' }}
          prerelease: false
          args: ${{ matrix.args }}

      # 8 · 额外上传 artifact 一份 (UI 上方便下载 · 即使没发 release)
      - name: upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tauri-build-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.nsis.zip
            src-tauri/target/**/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
          retention-days: 30
          if-no-files-found: warn
